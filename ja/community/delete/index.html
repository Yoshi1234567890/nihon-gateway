<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>投稿削除</title>
  <link rel="icon" type="image/jpeg" href="../../../assets/images/brand/favicon.png"><script>
(function () {
  var segments = location.pathname.split('/').filter(Boolean);
  if (segments.length && /\.html$/i.test(segments[segments.length - 1])) segments.pop();

  var localeIndex = -1;
  for (var i = 0; i < segments.length; i++) {
    if (segments[i] === 'ja' || segments[i] === 'de') { localeIndex = i; break; }
  }

  var depth = localeIndex >= 0 ? (segments.length - localeIndex) : Math.max(segments.length - 1, 0);
  var prefix = depth === 0 ? './' : '../'.repeat(depth);

  var css = document.createElement('link');
  css.rel = 'stylesheet';
  css.href = prefix + 'assets/css/cookie-consent.css';
  document.head.appendChild(css);

  var js = document.createElement('script');
  js.src = prefix + 'assets/js/cookie-consent.js';
  js.defer = true;
  document.head.appendChild(js);
})();
</script>
  <style>
:root{--cream:#fdf8f2;--ink:#1a1014;--muted:#6b5e68;--border:#dce4ee;--card:0 10px 30px rgba(26,16,20,.07)}
*{box-sizing:border-box}
body{margin:0;font-family:'Outfit','Noto Sans JP','Hiragino Sans','Yu Gothic UI',sans-serif;background:linear-gradient(rgba(247,248,250,.78), rgba(247,248,250,.82)),url("../../../assets/images/brand/site-bg.jpg") center top / cover fixed no-repeat,var(--cream);color:var(--ink);line-height:1.6}
a{text-decoration:none;color:inherit}
.site-header{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.84);backdrop-filter:blur(12px);border-bottom:1px solid rgba(230,234,240,.92)}
.container{width:min(1280px,calc(100% - 32px));margin:0 auto}
.header-inner{min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand{display:flex;align-items:center;gap:12px}.brand-logo{width:120px;height:70px;object-fit:contain}.brand-title{font-size:14px;font-weight:800;letter-spacing:.08em}.brand-sub{font-size:12px;color:var(--muted)}
.header-nav a{font-size:14px;font-weight:600;color:#34414d;padding:8px 12px;border-radius:999px;border:1px solid #dce4ee;background:rgba(255,255,255,.74)}
.wrap{max-width:980px;margin:0 auto;padding:28px 18px 60px}
.panel{background:#fff;border:1px solid var(--border);border-radius:22px;box-shadow:var(--card);padding:22px}
.page-footer{margin:24px auto 0;max-width:980px;border:1px solid #dce4ee;border-radius:20px;background:linear-gradient(135deg,#fbfdff,#f6f9fc);box-shadow:0 16px 34px rgba(19,35,58,.10);padding:24px}
.footer-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:22px;flex-wrap:wrap}.footer-left{display:flex;gap:16px;align-items:flex-start}.footer-logo{width:112px;height:112px;object-fit:contain}
.footer-title{font-size:14px;font-weight:800;letter-spacing:.08em}.footer-sub,.footer-meta{color:var(--muted);font-size:13px}
.footer-links{display:flex;gap:8px;flex-wrap:wrap}.footer-links a{font-size:12px;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.72);border:1px solid #e2e8f0}

  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="../">
        <img class="brand-logo" src="../../../assets/images/brand/nihon-gateway-logo.png" alt="Nihon Gateway Germany">
        <div><span class="brand-title">NIHON GATEWAY GERMANY</span><span class="brand-sub">Community Board</span></div>
      </a>
      <nav class="header-nav"><a href="../">掲示板トップへ戻る</a></nav>
    </div>
  </header>

  <h1>投稿削除</h1>
  <p id="msg">処理中...</p>
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwvGmCKVjbWak1xmqU3li33sS_eSx-g5eZU9NUPUYA_9YD7E2NmwUHe9a0SrG6YFBZt/exec';
    (async function() {
      const token = new URLSearchParams(location.search).get('token') || '';
      const el = document.getElementById('msg');
      if (!token) {
        el.textContent = '無効なリンクです。';
        return;
      }
      try {
        const res = await fetch(GAS_URL + '?action=deletePostByToken&token=' + encodeURIComponent(token));
        const data = await res.json();
        el.textContent = data.ok ? '投稿を削除しました。' : '削除に失敗しました。';
      } catch (e) {
        el.textContent = '削除に失敗しました。';
      }
    })();
  </script>

  <footer class="page-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <img class="footer-logo" src="../../../assets/images/brand/nihon-gateway-logo.png" alt="Nihon Gateway Germany">
        <div><p class="footer-title">NIHON GATEWAY GERMANY</p><p class="footer-sub">日本人コミュニティのための情報ハブ</p><p class="footer-meta">© Nihon Gateway Germany</p></div>
      </div>
      <div class="footer-links"><a href="../../about/">運営情報</a><a href="../../contact/">お問い合わせ</a></div>
    </div>
  </footer>

</body>
</html>
