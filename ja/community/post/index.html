<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投稿フォーム | Nihon Gateway Germany</title>
  <meta name="description" content="Nihon Gateway Germany コミュニティ掲示板の投稿フォーム。" />
  <link rel="icon" type="image/jpeg" href="../../../assets/images/brand/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f7f8fa;--surface:#fbfcfd;--line:#e6eaf0;--text:#16202a;--muted:#5f6b76;--brand:#d84b6a;--brand-dark:#bc3856;--hover:#fff4f7;--shadow:0 12px 32px rgba(19,35,58,.12)}
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:'Inter','Noto Sans JP',sans-serif;color:var(--text);line-height:1.6;background:linear-gradient(rgba(247,248,250,.78),rgba(247,248,250,.82)),url('../../../assets/images/brand/site-bg.jpg') center top/cover fixed no-repeat,var(--bg)}
    .container{width:min(980px,calc(100% - 32px));margin:0 auto}
    .site-header,.site-footer{background:rgba(255,255,255,.84);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)} .site-footer{border-top:1px solid var(--line);border-bottom:none;margin-top:36px}
    .bar{min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit}.brand img{width:120px;height:70px;object-fit:contain}.brand b{font-size:14px;letter-spacing:.08em}.brand span{display:block;color:var(--muted);font-size:12px}
    main{padding:28px 0 40px}.card{background:var(--surface);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:24px}
    h1{font-size:1.9rem;margin-bottom:8px}.lead{color:var(--muted);margin-bottom:18px}
    .back{display:inline-flex;margin-bottom:16px;color:var(--muted);text-decoration:none;font-weight:700}.back:hover{color:var(--brand)}
    .form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.full{grid-column:1/-1}
    label{display:block;margin:0 0 6px;font-size:.92rem;font-weight:700} input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px 13px;font:inherit;color:var(--text);outline:none}
    textarea{min-height:150px;resize:vertical} input:focus,select:focus,textarea:focus{border-color:var(--brand)}
    .btn{border:none;border-radius:12px;min-height:46px;padding:0 18px;font:inherit;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff}
    .btn:hover{filter:brightness(1.05)} .subtle{font-size:.84rem;color:var(--muted);margin-top:14px}
    @media (max-width:760px){.form-grid{grid-template-columns:1fr}}
  </style>
<script>(function(){var s=location.pathname.split('/').filter(Boolean);if(s.length&&/\.html$/i.test(s[s.length-1]))s.pop();var l=-1;for(var i=0;i<s.length;i++){if(s[i]==='ja'||s[i]==='de'){l=i;break}}var d=l>=0?(s.length-l):Math.max(s.length-1,0);var p=d===0?'./':'../'.repeat(d);var c=document.createElement('link');c.rel='stylesheet';c.href=p+'assets/css/cookie-consent.css';document.head.appendChild(c);var j=document.createElement('script');j.src=p+'assets/js/cookie-consent.js';j.defer=true;document.head.appendChild(j);})();</script>
</head>
<body>
<header class="site-header"><div class="container bar"><a class="brand" href="../../"><img src="../../../assets/images/brand/logo.png" alt="Nihon Gateway Germany"><div><b>Nihon Gateway Germany</b><span>ドイツ生活×日本語サポート</span></div></a></div></header>
<main class="container">
  <a class="back" href="../">← 掲示板一覧へ戻る</a>
  <section class="card">
    <h1>投稿フォーム</h1><p class="lead">投稿は送信後に管理者確認となります。メールアドレスや電話番号は掲示板に表示されません。</p>
    <form id="postForm" class="form-grid" enctype="multipart/form-data">
      <input type="hidden" name="action" value="submitPost"><div><label for="category1">カテゴリ1</label><select name="category1" id="category1" required></select></div><div><label for="category2">カテゴリ2</label><select name="category2" id="category2" required></select></div>
      <div class="full"><label for="title">タイトル</label><input id="title" name="title" required placeholder="例：デュッセルドルフでソファ売ります"></div><div class="full"><label for="body">本文</label><textarea id="body" name="body" required placeholder="内容、条件、受け渡し方法などを記載してください"></textarea></div>
      <div><label for="country">国</label><input id="country" name="country" value="Germany"></div><div><label for="region">地域</label><input id="region" name="region" placeholder="NRW, Berlin など"></div><div><label for="city">都市</label><input id="city" name="city" required placeholder="Düsseldorf"></div><div><label for="nickname">ニックネーム</label><input id="nickname" name="nickname" required></div>
      <div><label for="contact_email_private">非公開メールアドレス</label><input id="contact_email_private" name="contact_email_private" type="email" required></div><div><label for="contact_phone_private">非公開電話番号（任意）</label><input id="contact_phone_private" name="contact_phone_private"></div>
      <div><label for="preferred_contact_method">希望連絡方法</label><input id="preferred_contact_method" name="preferred_contact_method" placeholder="サイト経由メッセージ優先 など"></div><div><label for="price">価格（必要な場合）</label><input id="price" name="price" placeholder="€50"></div>
      <div><label for="event_date">イベント日（イベント投稿のみ）</label><input id="event_date" name="event_date" type="date"></div><div><label for="availability_date">利用可能日（物件など）</label><input id="availability_date" name="availability_date" type="date"></div>
      <div><label for="image1">画像1</label><input id="image1" name="image1" type="file" accept=".jpg,.jpeg,.png,.webp"></div><div><label for="image2">画像2</label><input id="image2" name="image2" type="file" accept=".jpg,.jpeg,.png,.webp"></div>
      <div class="full"><label for="image3">画像3</label><input id="image3" name="image3" type="file" accept=".jpg,.jpeg,.png,.webp"></div><div class="full"><label><input type="checkbox" required> 利用ルールに同意します</label></div><div class="full"><button class="btn" type="submit">投稿を送信する</button></div>
    </form><p class="subtle">送信後、投稿者メール宛に削除リンクが送られます。</p>
  </section>
</main>
<footer class="site-footer"><div class="container bar"><small>© Nihon Gateway Germany</small></div></footer>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbwvGmCKVjbWak1xmqU3li33sS_eSx-g5eZU9NUPUYA_9YD7E2NmwUHe9a0SrG6YFBZt/exec';
async function fetchJson(url,o={}){const r=await fetch(url,o);if(!r.ok)throw new Error('Network error');return await r.json()} let categoryMap={};
async function loadCategories(){try{const data=await fetchJson(GAS_URL+'?action=getCategories');if(!data.ok)throw new Error('Failed to load categories');categoryMap=data.categories||{};const c1=document.getElementById('category1'),c2=document.getElementById('category2');c1.innerHTML='<option value="">選択してください</option>';Object.keys(categoryMap).forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=k;c1.appendChild(o)});c1.addEventListener('change',()=>{c2.innerHTML='<option value="">選択してください</option>';(categoryMap[c1.value]||[]).forEach(sub=>{const o=document.createElement('option');o.value=sub;o.textContent=sub;c2.appendChild(o)})})}catch(e){alert('カテゴリの読み込みに失敗しました')}}
document.getElementById('postForm').addEventListener('submit',async e=>{e.preventDefault();const fd=new FormData(e.target);try{const res=await fetch(GAS_URL,{method:'POST',body:fd});const data=await res.json();if(data.ok)location.href='../thanks/';else alert(data.error||'送信に失敗しました')}catch(_){alert('送信に失敗しました')}});loadCategories();
</script>
</body></html>
