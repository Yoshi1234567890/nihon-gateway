<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投稿フォーム | Nihon Gateway Germany</title>
  <meta name="description" content="交流掲示板の投稿フォームです。" />
  <link rel="icon" type="image/jpeg" href="../../../assets/images/brand/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>body{margin:0;font-family:'Outfit','Noto Sans JP',sans-serif;background:linear-gradient(rgba(247,248,250,.78),rgba(247,248,250,.82)),url('../../../assets/images/brand/site-bg.jpg') center top/cover fixed no-repeat,#fdf8f2;color:#1a1014}.container{width:min(1100px,calc(100% - 32px));margin:0 auto}.site-header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.84);backdrop-filter:blur(12px);border-bottom:1px solid #e6eaf0}.header-inner{min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{display:flex;gap:12px;align-items:center;color:inherit;text-decoration:none}.brand-logo{width:120px;height:70px;object-fit:contain}.brand-title{font-weight:800;font-size:14px;letter-spacing:.08em}.brand-sub{font-size:12px;color:#6b5e68}.header-nav a{text-decoration:none;color:#34414d;padding:8px 12px;border:1px solid #dce4ee;border-radius:999px;background:rgba(255,255,255,.74);font-size:14px}.wrap{padding:28px 0 48px}.panel{background:#fff;border:1px solid #dce4ee;border-radius:20px;box-shadow:0 10px 30px rgba(26,16,20,.07);padding:22px}.lead{color:#6b5e68;line-height:1.8}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.full{grid-column:1/-1}label{display:block;font-size:.92rem;font-weight:700;margin:0 0 6px}input,select,textarea{width:100%;border:1px solid #d9e0e8;border-radius:14px;padding:12px 13px;font:inherit}textarea{min-height:150px;resize:vertical}input:focus,select:focus,textarea:focus{outline:none;border-color:#2f6df5;box-shadow:0 0 0 3px rgba(47,109,245,.1)}.btn{border:none;border-radius:14px;min-height:46px;padding:0 18px;font:inherit;font-weight:800;cursor:pointer;background:linear-gradient(135deg,#00b4a6,#2f6df5);color:#fff}.subtle{font-size:.84rem;color:#6b5e68}.page-footer{margin-top:24px;border:1px solid #dce4ee;border-radius:20px;background:linear-gradient(135deg,#fbfdff,#f6f9fc);padding:24px}.footer-inner{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap}.footer-left{display:flex;gap:16px}.footer-logo{width:112px;height:112px;object-fit:contain}.footer-links{display:flex;gap:8px;flex-wrap:wrap}.footer-links a{font-size:12px;padding:6px 10px;border:1px solid #e2e8f0;border-radius:999px;background:#fff;text-decoration:none;color:#34414d}@media(max-width:760px){.form-grid{grid-template-columns:1fr}}</style>
<script>(function(){var segments=location.pathname.split('/').filter(Boolean);if(segments.length&&/\.html$/i.test(segments[segments.length-1]))segments.pop();var localeIndex=-1;for(var i=0;i<segments.length;i++){if(segments[i]==='ja'||segments[i]==='de'){localeIndex=i;break;}}var depth=localeIndex>=0?(segments.length-localeIndex):Math.max(segments.length-1,0);var prefix=depth===0?'./':'../'.repeat(depth);var css=document.createElement('link');css.rel='stylesheet';css.href=prefix+'assets/css/cookie-consent.css';document.head.appendChild(css);var js=document.createElement('script');js.src=prefix+'assets/js/cookie-consent.js';js.defer=true;document.head.appendChild(js);})();</script>
</head>
<body>
<header class="site-header"><div class="container header-inner"><a class="brand" href="/nihon-gateway-germany/ja/"><img class="brand-logo" src="../../../assets/images/brand/logo_header.png" alt="logo"><span><span class="brand-title">NIHON GATEWAY GERMANY</span><span class="brand-sub">ドイツと日本をつなぐ総合ポータル</span></span></a><nav class="header-nav"><a href="/nihon-gateway-germany/ja/community/">掲示板一覧へ戻る</a></nav></div></header>
<main class="container wrap"><section class="panel"><h1>投稿フォーム</h1><p class="lead">投稿は送信後に管理者確認となります。メールアドレスや電話番号は掲示板に表示されません。</p><form id="postForm" class="form-grid" enctype="multipart/form-data"><input type="hidden" name="action" value="submitPost"><div><label for="category1">カテゴリ1</label><select name="category1" id="category1" required></select></div><div><label for="category2">カテゴリ2</label><select name="category2" id="category2" required></select></div><div class="full"><label for="title">タイトル</label><input id="title" name="title" required placeholder="例：デュッセルドルフでソファ売ります"></div><div class="full"><label for="body">本文</label><textarea id="body" name="body" required placeholder="内容、条件、受け渡し方法などを記載してください"></textarea></div><div><label for="country">国</label><input id="country" name="country" value="Germany"></div><div><label for="region">地域</label><input id="region" name="region" placeholder="NRW, Berlin など"></div><div><label for="city">都市</label><input id="city" name="city" required placeholder="Düsseldorf"></div><div><label for="nickname">ニックネーム</label><input id="nickname" name="nickname" required></div><div><label for="contact_email_private">非公開メールアドレス</label><input id="contact_email_private" name="contact_email_private" type="email" required></div><div><label for="contact_phone_private">非公開電話番号（任意）</label><input id="contact_phone_private" name="contact_phone_private"></div><div><label for="preferred_contact_method">希望連絡方法</label><input id="preferred_contact_method" name="preferred_contact_method" placeholder="サイト経由メッセージ優先 など"></div><div><label for="price">価格（必要な場合）</label><input id="price" name="price" placeholder="€50"></div><div><label for="event_date">イベント日（イベント投稿のみ）</label><input id="event_date" name="event_date" type="date"></div><div><label for="availability_date">利用可能日（物件など）</label><input id="availability_date" name="availability_date" type="date"></div><div><label for="image1">画像1</label><input id="image1" name="image1" type="file" accept=".jpg,.jpeg,.png,.webp"></div><div><label for="image2">画像2</label><input id="image2" name="image2" type="file" accept=".jpg,.jpeg,.png,.webp"></div><div class="full"><label for="image3">画像3</label><input id="image3" name="image3" type="file" accept=".jpg,.jpeg,.png,.webp"></div><div class="full"><label><input type="checkbox" required> 利用ルールに同意します</label></div><div class="full"><button class="btn" type="submit">投稿を送信する</button></div></form><p class="subtle">送信後、投稿者メール宛に削除リンクが送られます。</p></section><footer class="page-footer"><div class="footer-inner"><div class="footer-left"><img class="footer-logo" src="../../../assets/images/brand/logo_footer.png" alt="logo"><div><strong>NIHON GATEWAY GERMANY</strong><div>ドイツと日本をつなぐ総合ポータル</div></div></div><div class="footer-links"><a href="/nihon-gateway-germany/ja/privacy/">プライバシー</a><a href="/nihon-gateway-germany/ja/terms/">利用規約</a></div></div></footer></main>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbwvGmCKVjbWak1xmqU3li33sS_eSx-g5eZU9NUPUYA_9YD7E2NmwUHe9a0SrG6YFBZt/exec';
async function fetchJson(url,opt={}){const res=await fetch(url,opt);if(!res.ok)throw new Error('Network error');return await res.json();}
let categoryMap={};
async function loadCategories(){try{const data=await fetchJson(GAS_URL+'?action=getCategories');if(!data.ok)throw new Error('failed');categoryMap=data.categories||{};const c1=document.getElementById('category1');const c2=document.getElementById('category2');c1.innerHTML='';Object.keys(categoryMap).forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=k;c1.appendChild(o);});const update=()=>{const key=c1.value;const list=categoryMap[key]||[];c2.innerHTML='';list.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;c2.appendChild(o);});};c1.addEventListener('change',update);update();}catch(e){alert('カテゴリの読み込みに失敗しました。');}}
document.getElementById('postForm').addEventListener('submit',async e=>{e.preventDefault();const fd=new FormData(e.target);try{const res=await fetch(GAS_URL,{method:'POST',body:fd});const data=await res.json();if(data.ok)location.href='../thanks/';else alert('送信に失敗しました。');}catch(err){alert('送信に失敗しました。');}});loadCategories();
</script>
</body>
</html>
