<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>投稿削除 | Nihon Gateway Germany</title><link rel="icon" type="image/jpeg" href="../../../assets/images/brand/favicon.png"><style>body{font-family:'Noto Sans JP',sans-serif;max-width:760px;margin:auto;padding:40px;background:linear-gradient(rgba(247,248,250,.78),rgba(247,248,250,.82)),url('../../../assets/images/brand/site-bg.jpg') center top/cover fixed no-repeat,#fdf8f2}.panel{background:#fff;border:1px solid #dce4ee;border-radius:16px;padding:24px}</style></head><body><div class="panel"><h1>投稿削除</h1><p id="msg">処理中...</p><p><a href="/nihon-gateway-germany/ja/community/">掲示板へ戻る</a></p></div><script>const GAS_URL='https://script.google.com/macros/s/AKfycbwvGmCKVjbWak1xmqU3li33sS_eSx-g5eZU9NUPUYA_9YD7E2NmwUHe9a0SrG6YFBZt/exec';(async function(){const token=new URLSearchParams(location.search).get('token')||'';const el=document.getElementById('msg');if(!token){el.textContent='無効なリンクです。';return;}try{const res=await fetch(GAS_URL+'?action=deletePostByToken&token='+encodeURIComponent(token));const data=await res.json();el.textContent=data.ok?'投稿を削除しました。':'削除に失敗しました。';}catch(e){el.textContent='削除に失敗しました。';}})();</script></body></html>
