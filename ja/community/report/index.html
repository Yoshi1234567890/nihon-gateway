<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>通報する | Nihon Gateway Germany</title><link rel="icon" type="image/jpeg" href="../../../assets/images/brand/favicon.png"><style>body{font-family:'Inter','Noto Sans JP',sans-serif;max-width:760px;margin:auto;padding:24px;background:linear-gradient(rgba(247,248,250,.78),rgba(247,248,250,.82)),url('../../../assets/images/brand/site-bg.jpg') center top/cover fixed no-repeat,#f7f8fa;color:#16202a}form{background:#fbfcfd;border:1px solid #e6eaf0;border-radius:16px;padding:18px}input,textarea,select{width:100%;padding:10px;margin:8px 0;border:1px solid #d9e0e8;border-radius:10px}button{padding:12px 18px;border:none;border-radius:10px;background:linear-gradient(135deg,#d84b6a,#bc3856);color:#fff;font-weight:700}a{color:#d84b6a;text-decoration:none;font-weight:700}</style><script>(function(){var s=location.pathname.split('/').filter(Boolean);if(s.length&&/\.html$/i.test(s[s.length-1]))s.pop();var l=-1;for(var i=0;i<s.length;i++){if(s[i]==='ja'||s[i]==='de'){l=i;break}}var d=l>=0?(s.length-l):Math.max(s.length-1,0);var p=d===0?'./':'../'.repeat(d);var c=document.createElement('link');c.rel='stylesheet';c.href=p+'assets/css/cookie-consent.css';document.head.appendChild(c);var j=document.createElement('script');j.src=p+'assets/js/cookie-consent.js';j.defer=true;document.head.appendChild(j);})();</script></head><body><a href="../">← 掲示板一覧へ戻る</a><h1>投稿を通報する</h1><form id="reportForm"><input name="action" type="hidden" value="submitReport"><input name="post_id" id="post_id" type="hidden"><label>理由</label><select name="reason" required><option value="">選択してください</option><option>スパム</option><option>不適切な内容</option><option>詐欺の疑い</option><option>重複投稿</option><option>その他</option></select><label>詳細</label><textarea name="detail"></textarea><label>あなたのメール（任意）</label><input name="reporter_email" type="email"><button type="submit">送信する</button></form><script>const GAS_URL='https://script.google.com/macros/s/AKfycbwvGmCKVjbWak1xmqU3li33sS_eSx-g5eZU9NUPUYA_9YD7E2NmwUHe9a0SrG6YFBZt/exec';document.getElementById('post_id').value=new URLSearchParams(location.search).get('post_id')||'';document.getElementById('reportForm').addEventListener('submit',async(e)=>{e.preventDefault();const fd=new FormData(e.target);const res=await fetch(GAS_URL,{method:'POST',body:fd});const data=await res.json();if(data.ok)location.href='../thanks/';else alert('送信に失敗しました');});</script></body></html>
