<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>投稿者に連絡する | Nihon Gateway Germany</title><link rel="icon" type="image/jpeg" href="../../../assets/images/brand/favicon.png"><style>body{font-family:'Noto Sans JP',sans-serif;max-width:760px;margin:auto;padding:24px;background:linear-gradient(rgba(247,248,250,.78),rgba(247,248,250,.82)),url('../../../assets/images/brand/site-bg.jpg') center top/cover fixed no-repeat,#fdf8f2}form{background:#fff;border:1px solid #dce4ee;border-radius:16px;padding:18px}input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #d9e0e8;border-radius:10px}button{padding:12px 18px;border:none;border-radius:10px;background:linear-gradient(135deg,#00b4a6,#2f6df5);color:#fff;font-weight:700}</style></head><body><p><a href="/nihon-gateway-germany/ja/community/">← 掲示板へ戻る</a></p><h1>投稿者に連絡する</h1><form id="contactForm"><input name="action" type="hidden" value="submitInquiry"><input name="post_id" id="post_id" type="hidden"><label>あなたの名前</label><input name="sender_name" required><label>あなたのメール</label><input name="sender_email" type="email" required><label>件名</label><input name="subject" required><label>メッセージ</label><textarea name="message" required></textarea><button type="submit">送信する</button></form><script>const GAS_URL='https://script.google.com/macros/s/AKfycbwvGmCKVjbWak1xmqU3li33sS_eSx-g5eZU9NUPUYA_9YD7E2NmwUHe9a0SrG6YFBZt/exec';document.getElementById('post_id').value=new URLSearchParams(location.search).get('post_id')||'';document.getElementById('contactForm').addEventListener('submit',async(e)=>{e.preventDefault();const fd=new FormData(e.target);const res=await fetch(GAS_URL,{method:'POST',body:fd});const data=await res.json();if(data.ok)location.href='../thanks/';else alert('送信に失敗しました');});</script></body></html>
