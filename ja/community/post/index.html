<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投稿フォーム | Nihon Gateway Germany</title>
  <meta name="description" content="Nihon Gateway Germany コミュニティ掲示板への投稿フォームです。" />
  <link rel="icon" type="image/jpeg" href="../../../assets/images/brand/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#f7f8fa;--surface:#fbfcfd;--line:#e6eaf0;--text:#16202a;--muted:#5f6b76;--brand:#d84b6a;--brand-dark:#bc3856;--accent:#2f80ed;--container:980px}
    *{box-sizing:border-box}body{margin:0;font-family:'Inter','Noto Sans JP',sans-serif;color:var(--text);background:linear-gradient(rgba(247,248,250,.78),rgba(247,248,250,.82)),url('../../../assets/images/brand/site-bg.jpg') center top/cover fixed no-repeat,var(--bg)}
    .container{width:min(var(--container),calc(100% - 32px));margin:0 auto}.site-header,.site-footer{background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}.site-footer{border-top:1px solid var(--line);border-bottom:none;margin-top:48px}
    .bar{min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:14px}.logo{height:48px;object-fit:contain}.home{color:var(--muted);text-decoration:none;font-weight:700}
    .panel{margin:30px auto;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 10px 28px rgba(19,35,58,.08)}h1{margin:0 0 10px;font-size:1.9rem}.lead{margin:0 0 18px;color:var(--muted)}
    form{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.full{grid-column:1/-1}label{display:block;font-weight:700;font-size:.92rem;margin:0 0 6px}input,select,textarea{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;font:inherit;background:#fff}textarea{min-height:150px;resize:vertical}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,128,237,.14)}
    .agree{display:flex;gap:8px;align-items:flex-start}.agree input{width:auto;margin-top:3px}.btn{border:none;background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer}.btn:hover{opacity:.93}
    .note{margin-top:12px;color:var(--muted);font-size:.9rem}@media (max-width:760px){form{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="site-header"><div class="container bar"><a href="../../"><img class="logo" src="../../../assets/images/brand/logo.png" alt="Nihon Gateway Germany" /></a><a class="home" href="../">← 掲示板一覧へ戻る</a></div></header>
  <main class="container"><section class="panel"><h1>投稿フォーム</h1><p class="lead">投稿は送信後に管理者確認となります。メールアドレスや電話番号は掲示板に表示されません。</p>
      <form id="postForm" enctype="multipart/form-data">
        <input type="hidden" name="action" value="submitPost">
        <div><label for="category1">カテゴリ1</label><select name="category1" id="category1" required></select></div>
        <div><label for="category2">カテゴリ2</label><select name="category2" id="category2" required></select></div>
        <div class="full"><label for="title">タイトル</label><input id="title" name="title" required placeholder="例：デュッセルドルフでソファ売ります"></div>
        <div class="full"><label for="body">本文</label><textarea id="body" name="body" required placeholder="内容、条件、受け渡し方法などを記載してください"></textarea></div>
        <div><label for="country">国</label><input id="country" name="country" value="Germany"></div>
        <div><label for="region">地域</label><input id="region" name="region" placeholder="NRW, Berlin など"></div>
        <div><label for="city">都市</label><input id="city" name="city" required placeholder="Düsseldorf"></div>
        <div><label for="nickname">ニックネーム</label><input id="nickname" name="nickname" required></div>
        <div><label for="contact_email_private">非公開メールアドレス</label><input id="contact_email_private" name="contact_email_private" type="email" required></div>
        <div><label for="contact_phone_private">非公開電話番号（任意）</label><input id="contact_phone_private" name="contact_phone_private"></div>
        <div><label for="preferred_contact_method">希望連絡方法</label><input id="preferred_contact_method" name="preferred_contact_method" placeholder="サイト経由メッセージ優先 など"></div>
        <div><label for="price">価格（必要な場合）</label><input id="price" name="price" placeholder="€50"></div>
        <div><label for="event_date">イベント日（イベント投稿のみ）</label><input id="event_date" name="event_date" type="date"></div>
        <div><label for="availability_date">利用可能日（物件など）</label><input id="availability_date" name="availability_date" type="date"></div>
        <div><label for="image1">画像1</label><input id="image1" name="image1" type="file" accept=".jpg,.jpeg,.png,.webp"></div>
        <div><label for="image2">画像2</label><input id="image2" name="image2" type="file" accept=".jpg,.jpeg,.png,.webp"></div>
        <div class="full"><label for="image3">画像3</label><input id="image3" name="image3" type="file" accept=".jpg,.jpeg,.png,.webp"></div>
        <div class="full agree"><input type="checkbox" required id="agree"><label for="agree">利用ルールに同意します</label></div>
        <div class="full"><button class="btn" type="submit">投稿を送信する</button></div>
      </form>
      <p class="note">送信後、投稿者メール宛に削除リンクが送られます。</p>
  </section></main>
  <footer class="site-footer"><div class="container bar" style="min-height:60px"><small>© Nihon Gateway Germany</small></div></footer>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbwvGmCKVjbWak1xmqU3li33sS_eSx-g5eZU9NUPUYA_9YD7E2NmwUHe9a0SrG6YFBZt/exec';
async function fetchJson(url,options={}){const res=await fetch(url,options);if(!res.ok)throw new Error('Network error');return await res.json();}
let categoryMap={};
async function loadCategories(){try{const data=await fetchJson(GAS_URL+'?action=getCategories');if(!data.ok)throw new Error();categoryMap=data.categories||{};const cat1=document.getElementById('category1');cat1.innerHTML='<option value="">選択してください</option>';Object.keys(categoryMap).forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=k;cat1.appendChild(o);});fillCategory2();}catch(e){alert('カテゴリ取得に失敗しました');}}
function fillCategory2(){const c1=document.getElementById('category1').value;const c2=document.getElementById('category2');c2.innerHTML='<option value="">選択してください</option>';(categoryMap[c1]||[]).forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;c2.appendChild(o);});}
document.getElementById('category1').addEventListener('change',fillCategory2);
document.getElementById('postForm').addEventListener('submit',async(e)=>{e.preventDefault();const fd=new FormData(e.target);try{const res=await fetch(GAS_URL,{method:'POST',body:fd});const data=await res.json();if(data.ok)location.href='../thanks/';else alert('送信に失敗しました');}catch(_){alert('送信に失敗しました');}});
loadCategories();
</script>
</body>
</html>
