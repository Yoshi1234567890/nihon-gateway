<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投稿者に連絡する | Nihon Gateway Germany</title>
  <link rel="icon" type="image/png" href="../../../assets/images/brand/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>:root{--bg:#f7f8fa;--surface:#fff;--line:#e6eaf0;--text:#16202a;--muted:#5f6b76;--brand:#d84b6a;--brand-dark:#bc3856;--container:980px}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter','Noto Sans JP',sans-serif;color:var(--text);line-height:1.6;background:linear-gradient(rgba(247,248,250,.8),rgba(247,248,250,.84)),url('../../../assets/images/brand/site-bg.jpg') center top/cover fixed no-repeat,var(--bg)}.container{width:min(var(--container),calc(100% - 32px));margin:0 auto}.site-header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}.header-inner{min-height:72px;display:flex;align-items:center;justify-content:space-between}.brand img{height:58px}.main{padding:28px 0 56px}.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:0 14px 34px rgba(19,35,58,.1)}h1{font-size:30px;margin-bottom:10px}.lead{color:var(--muted);margin-bottom:18px}label{display:block;font-size:14px;font-weight:700;margin:10px 0 6px}input,textarea,select{width:100%;border:1px solid #dce3ec;border-radius:12px;padding:12px;background:#fff;font:inherit}textarea{min-height:130px;resize:vertical}.btn{border:none;border-radius:999px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;font-weight:800;padding:12px 24px;cursor:pointer;margin-top:12px}.nav{margin-bottom:14px}.nav a{color:#3d4a57;text-decoration:none;font-weight:700}.site-footer{margin-top:56px;border-top:1px solid var(--line);background:rgba(255,255,255,.86)}.footer-inner{min-height:84px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:12px 0}.footer-inner img{height:48px}</style>
</head>
<body>
<header class="site-header"><div class="container header-inner"><a class="brand" href="../../index.html"><img src="../../../assets/images/brand/logo_header.png" alt="Nihon Gateway Germany"></a><a href="../index.html" style="text-decoration:none;color:#3d4a57;font-weight:700">掲示板トップ</a></div></header>
<main class="main"><div class="container"><div class="nav"><a href="../index.html">← 掲示板一覧へ戻る</a></div><section class="card"><h1>投稿者に連絡する</h1><p class="lead">投稿者へメッセージを送信します。</p><form id="contactForm"><input name="action" type="hidden" value="submitInquiry"><input name="post_id" id="post_id" type="hidden"><label>あなたの名前</label><input name="sender_name" required><label>あなたのメール</label><input name="sender_email" type="email" required><label>件名</label><input name="subject" required><label>メッセージ</label><textarea name="message" required></textarea><button class="btn" type="submit">送信する</button></form></section></div></main>
<footer class="site-footer"><div class="container footer-inner"><img src="../../../assets/images/brand/logo_footer.png" alt="Nihon Gateway Germany"><small>© Nihon Gateway Germany</small></div></footer>
<script src="../../../assets/js/cookie-consent.js" defer></script>
<script>const GAS_URL='https://script.google.com/macros/s/AKfycbwvGmCKVjbWak1xmqU3li33sS_eSx-g5eZU9NUPUYA_9YD7E2NmwUHe9a0SrG6YFBZt/exec';document.getElementById('post_id').value=new URLSearchParams(location.search).get('post_id')||'';document.getElementById('contactForm').addEventListener('submit',async(e)=>{e.preventDefault();const fd=new FormData(e.target);const res=await fetch(GAS_URL,{method:'POST',body:fd});const data=await res.json();if(data.ok)location.href='../thanks/index.html';else alert('送信に失敗しました');});</script>
</body></html>
