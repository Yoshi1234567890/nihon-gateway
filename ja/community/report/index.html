<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>通報する | Nihon Gateway Germany</title><link rel="icon" type="image/jpeg" href="../../../assets/images/brand/favicon.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet"><style>:root{--bg:#f7f8fa;--line:#e6eaf0;--text:#16202a;--brand:#d84b6a;--accent:#2f80ed}*{box-sizing:border-box}body{margin:0;font-family:'Inter','Noto Sans JP',sans-serif;color:var(--text);background:linear-gradient(rgba(247,248,250,.78),rgba(247,248,250,.82)),url('../../../assets/images/brand/site-bg.jpg') center top/cover fixed no-repeat,var(--bg)}.container{width:min(980px,calc(100% - 32px));margin:0 auto}.site-header,.site-footer{background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}.site-footer{border-top:1px solid var(--line);border-bottom:none;margin-top:48px}.bar{min-height:72px;display:flex;align-items:center;justify-content:space-between}.logo{height:48px}.home{font-weight:700;text-decoration:none;color:#5f6b76}.panel{margin:30px auto;background:#fbfcfd;border:1px solid var(--line);border-radius:18px;padding:24px}label{display:block;margin:10px 0 6px;font-weight:700}input,textarea,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;font:inherit}textarea{min-height:130px}input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,128,237,.15)}button{margin-top:12px;border:none;background:linear-gradient(135deg,var(--brand),#bc3856);color:#fff;border-radius:12px;padding:12px 18px;font-weight:800;cursor:pointer}</style></head><body><header class="site-header"><div class="container bar"><a href="../../"><img class="logo" src="../../../assets/images/brand/logo.png" alt="Nihon Gateway Germany"></a><a class="home" href="../">← 掲示板一覧へ戻る</a></div></header><main class="container"><section class="panel"><h1>投稿を通報する</h1><form id="reportForm"><input name="action" type="hidden" value="submitReport"><input name="post_id" id="post_id" type="hidden"><label>理由</label><select name="reason" required><option value="">選択してください</option><option>スパム</option><option>不適切な内容</option><option>詐欺の疑い</option><option>重複投稿</option><option>その他</option></select><label>詳細</label><textarea name="detail"></textarea><label>あなたのメール（任意）</label><input name="reporter_email" type="email"><button type="submit">送信する</button></form></section></main><footer class="site-footer"><div class="container bar" style="min-height:60px"><small>© Nihon Gateway Germany</small></div></footer><script>const GAS_URL='https://script.google.com/macros/s/AKfycbwvGmCKVjbWak1xmqU3li33sS_eSx-g5eZU9NUPUYA_9YD7E2NmwUHe9a0SrG6YFBZt/exec';document.getElementById('post_id').value=new URLSearchParams(location.search).get('post_id')||'';document.getElementById('reportForm').addEventListener('submit',async(e)=>{e.preventDefault();const fd=new FormData(e.target);const res=await fetch(GAS_URL,{method:'POST',body:fd});const data=await res.json();if(data.ok)location.href='../thanks/';else alert('送信に失敗しました');});</script></body></html>
